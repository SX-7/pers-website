backend:
  name: github
  repo: SX-7/pers-website
  branch: main
  base_url: https://oauth-p6qua7ddhq-uc.a.run.app
  auth_endpoint: /auth
  squash_merges: true

publish_mode: editorial_workflow

media_folder: "src/_images"
public_folder: "_images"

site_url: https://sx7.dev

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/projects"
    create: true
    nested:
      depth: 5
      summary: "{{title}}"
    extension: "md"
    format: "yaml-frontmatter"
    summary: "{{dirname}}/{{filename}}.{{extension}}"
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Type", name: "type", widget: "select", options: [{label: "Category", value: "category"}, {label: "Page", value: "page"}], default: "category" }
      - { label: "Body", name: "body", widget: "markdown" }
