backend:
  name: github
  repo: SX-7/pers-website
  branch: main
  base_url: https://oauth-p6qua7ddhq-uc.a.run.app
  auth_endpoint: /auth
  squash_merges: true

publish_mode: editorial_workflow

media_folder: "src/_images"
public_folder: "_images"

site_url: https://sx7.dev

collections:
  - name: "projects"
    label: "Projects"
    folder: "src/projects"
    create: true
    extension: "md"
    format: "frontmatter"
    nested:
      depth: 100
      subfolders: false
    slug: "{{year}}-{{month}}-{{day}}_{{slug}}"
    summary: "{{title}} - {{dirname}} - {{filename}} - {{extension}} - {{commit_date}} - {{commit_author}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Type", name: "type", widget: "select", options: [{label: "Category", value: "category"}, {label: "Page", value: "page"}], default: "category" }
      - { label: "Body", name: "body", widget: "markdown" }
